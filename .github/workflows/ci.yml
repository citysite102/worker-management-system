name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # 秒級檢查：型別、規約、單元測試。任何 push 都跑。
  check:
    name: 型別 / 規約 / 單元測試
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: 型別檢查（原始碼）
        run: pnpm check

      - name: 型別檢查（測試與 E2E）
        run: pnpm check:test

      - name: 專案規約檢查
        run: pnpm lint:conventions

      - name: 單元測試 + 覆蓋率
        run: pnpm test:coverage

      - name: 前端測試（jsdom）
        run: pnpm test:client

      - name: 上傳覆蓋率報告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # 整合測試：對真實 MySQL 驗證 SQL 與 schema。
  integration:
    name: 整合測試（真實 MySQL）
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wms_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      TEST_DATABASE_URL: mysql://root:root@127.0.0.1:3306/wms_test
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: 建立測試資料庫 schema
        run: pnpm test:db:setup

      - name: 整合測試
        run: pnpm test:integration

  # E2E：實際開瀏覽器跑使用者流程。最慢，放最後。
  e2e:
    name: E2E（Playwright）
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      E2E_DATABASE_URL: mysql://root:root@127.0.0.1:3306/wms_e2e
      JWT_SECRET: ci-e2e-secret

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: 安裝 Playwright 瀏覽器
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E
        run: pnpm e2e

      - name: 上傳 Playwright 報告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
